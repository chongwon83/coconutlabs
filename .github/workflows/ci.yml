name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [test]
    env:
      BURN_STORE: memory
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: E2E tests (dev mode — preflight + hero-fold + testid-coverage + onboarding)
        # Default playwright.config.ts has testIgnore /visual\.spec\.ts/ so this
        # job runs the 4 dev-mode contract specs. visual.spec.ts is owned by
        # the `visual` job below (prod build, baseline comparison).
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

  visual:
    # Permanent visual-regression comparison. Compares the live prod build
    # against the committed Linux baseline PNGs in e2e/visual.spec.ts-snapshots/.
    # Failure mode: any pixel diff above maxDiffPixelRatio=0.02 fails the PR.
    # Rebaseline: run the visual-baseline-lock.yml workflow_dispatch.
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Visual regression (prod build, baseline comparison)
        # NO --update-snapshots — comparison mode only. Asserts every pixel
        # against the committed Linux baseline. Snapshot diff = PR fails.
        run: npx playwright test --config=playwright.config.visual.ts

      - name: Upload diff artifact on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diff
          path: test-results/
          retention-days: 14
