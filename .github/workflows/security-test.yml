# Axes 5/6/7: Security and privacy tests.
#
# Axis 5 — fetch/XHR interception: verifies no forbidden keys or raw file text
#           escape to the network layer (burn-security.test.ts).
# Axis 6 — server persistence whitelist: validateSummary + projectEntry projection
#           enforce 9-field whitelist (burn-server-whitelist.test.ts).
# Axis 7 — telemetry privacy schema: all 4 event types, forbidden fields, session_id,
#           enum enforcement, network payload simulation (burn-telemetry-privacy.test.ts).
#
# Runs on every push and PR. Result is consumed by production-rollout-gate.yml.

name: security-test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run security and privacy tests (Axes 5/6/7)
        run: npm run test:security
