# Production rollout gate for the ?auto-detect=1 feature flag.
#
# Triggers when a PR touches the flag condition or default value in JoinBurnIndexForm.
# Evaluates all 7 axes:
#   Axes 1-3: live metrics from /api/internal/rollout-gate-metrics (runtime data)
#   Axes 4-7: vitest CI checks (parity-test and security-test workflows)
#
# If all axes pass (or are in WARN for 2-3), sets the "gate-pass" check ✅.
# Otherwise fails with a table showing the current state of each axis.
#
# Branch protection must require:
#   - gate-pass
#   - parity-test / parity
#   - security-test / security

name: production-rollout-gate

on:
  pull_request:
    paths:
      - "components/forms/JoinBurnIndexForm.tsx"

jobs:
  gate:
    runs-on: ubuntu-latest
    name: gate-pass

    steps:
      - uses: actions/checkout@v4

      - name: Evaluate rollout gate (Axes 1-3)
        id: gate
        env:
          GATE_METRICS_URL: ${{ secrets.GATE_METRICS_URL }}
          ROLLOUT_GATE_SECRET: ${{ secrets.ROLLOUT_GATE_SECRET }}
        run: |
          if [ -z "$GATE_METRICS_URL" ] || [ -z "$ROLLOUT_GATE_SECRET" ]; then
            echo "GATE_METRICS_URL or ROLLOUT_GATE_SECRET not configured."
            echo "Set both secrets to enable live gate evaluation."
            echo "gate_result=INSUFFICIENT_CONFIG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          response=$(curl -s -w "\n%{http_code}" \
            -H "x-gate-secret: $ROLLOUT_GATE_SECRET" \
            "$GATE_METRICS_URL/api/internal/rollout-gate-metrics")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          if [ "$http_code" != "200" ]; then
            echo "Metrics endpoint returned $http_code"
            echo "$body"
            exit 1
          fi

          echo "Metrics response:"
          echo "$body" | python3 -m json.tool 2>/dev/null || echo "$body"

          overall=$(echo "$body" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          axes = data.get('axes', {})

          rows = []
          for key in ['axis1', 'axis2', 'axis3', 'axis4', 'axis5', 'axis6', 'axis7']:
            ax = axes.get(key, {})
            state = ax.get('state', 'UNKNOWN')
            rows.append(f'| {key} | {state} |')

          print('\n'.join(rows))
          print('---')
          overall = data.get('overallGatePass', False)
          print('PASS' if overall else 'FAIL')
          " 2>&1)

          echo "$overall"
          result=$(echo "$overall" | tail -1)
          echo "gate_result=$result" >> "$GITHUB_OUTPUT"

          # Print axis table to job summary
          {
            echo "## Production Rollout Gate Results"
            echo ""
            echo "| Axis | State |"
            echo "|------|-------|"
            echo "$overall" | head -n -2
            echo ""
            if [ "$result" = "PASS" ]; then
              echo "✅ All axes pass — ON-flip PR may proceed."
            else
              echo "❌ Gate not passed — one or more axes are below threshold."
              echo ""
              echo "Axes 4-7 are CI-only. Check parity-test and security-test workflow results."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if gate not passed
        if: steps.gate.outputs.gate_result == 'FAIL'
        run: |
          echo "Production rollout gate FAILED. See job summary for axis details."
          exit 1

      - name: Pass (insufficient config)
        if: steps.gate.outputs.gate_result == 'INSUFFICIENT_CONFIG'
        run: |
          echo "Gate secrets not configured — skipping live evaluation."
          echo "Configure GATE_METRICS_URL and ROLLOUT_GATE_SECRET to enable."
