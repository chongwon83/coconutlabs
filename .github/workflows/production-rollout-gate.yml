# Production rollout gate for the ?auto-detect=1 feature flag.
#
# TRIGGER: workflow_dispatch only (manual trigger before ON-flip PR).
#
# Rationale for workflow_dispatch instead of pull_request:
#   - The gate calls /api/internal/rollout-gate-metrics on the Vercel production
#     deployment, which is protected by Vercel Deployment Protection (401 for
#     unauthenticated CI). Rather than expose a bypass token, the owner runs
#     the gate manually from their local machine and supplies the JSON result
#     as a workflow input.
#   - Evaluating on every PR caused all PRs to fail when Axis 1 < 15, blocking
#     the development flow for non-ON-flip work.
#   - On-flip PR should be the only time this workflow runs.
#
# Usage (before merging an ON-flip PR):
#   1. Run locally: curl -H "x-gate-secret: $SECRET" $GATE_METRICS_URL/api/internal/rollout-gate-metrics
#   2. Trigger this workflow with the JSON result pasted as the `metrics_json` input.
#   3. Review the job summary and only merge if all axes pass.
#
# Axes 4-7 are CI-only (vitest) — their pass/fail comes from parity-test and
# security-test workflow results, not from this workflow.

name: production-rollout-gate

on:
  workflow_dispatch:
    inputs:
      metrics_json:
        description: "JSON from GET /api/internal/rollout-gate-metrics (paste full response)"
        required: true
        type: string

jobs:
  gate:
    runs-on: ubuntu-latest
    name: gate-pass

    steps:
      - name: Validate secrets are configured
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.GATE_METRICS_URL }}" ] || [ -z "${{ secrets.ROLLOUT_GATE_SECRET }}" ]; then
            echo "::error::GATE_METRICS_URL or ROLLOUT_GATE_SECRET not configured — refusing to evaluate."
            echo "gate_result=FAIL" >> "$GITHUB_OUTPUT"
            exit 1
          fi
        id: check_secrets

      - name: Evaluate rollout gate (Axes 1-3)
        id: gate
        run: |
          set -euo pipefail

          body='${{ inputs.metrics_json }}'

          # Validate the JSON is parseable
          if ! echo "$body" | python3 -m json.tool > /dev/null 2>&1; then
            echo "::error::metrics_json input is not valid JSON."
            exit 1
          fi

          echo "Metrics input:"
          echo "$body" | python3 -m json.tool 2>/dev/null || echo "$body"

          result=$(echo "$body" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          axes = data.get('axes', {})

          rows = []
          for key in ['axis1', 'axis2', 'axis3', 'axis4', 'axis5', 'axis6', 'axis7']:
            ax = axes.get(key, {})
            state = ax.get('state', 'UNKNOWN')
            rows.append(f'| {key} | {state} |')

          print('\n'.join(rows))
          print('---')
          overall = data.get('overallGatePass', False)
          print('PASS' if overall else 'FAIL')
          " 2>&1)

          echo "$result"
          gate_result=$(echo "$result" | tail -1)

          # Allowlist: only PASS or FAIL are valid outcomes
          case "$gate_result" in
            PASS|FAIL) ;;
            *)
              echo "::error::Unexpected gate_result value: '$gate_result'. Expected PASS or FAIL."
              exit 1
              ;;
          esac

          echo "gate_result=$gate_result" >> "$GITHUB_OUTPUT"

          # Print axis table to job summary
          {
            echo "## Production Rollout Gate Results"
            echo ""
            echo "| Axis | State |"
            echo "|------|-------|"
            echo "$result" | head -n -2
            echo ""
            if [ "$gate_result" = "PASS" ]; then
              echo "✅ All axes pass — ON-flip PR may proceed."
            else
              echo "❌ Gate not passed — one or more axes are below threshold."
              echo ""
              echo "Axes 4-7 are CI-only. Check parity-test and security-test workflow results."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if gate not passed
        if: steps.gate.outputs.gate_result == 'FAIL'
        run: |
          set -euo pipefail
          echo "::error::Production rollout gate FAILED. See job summary for axis details."
          exit 1

      - name: Gate passed
        if: steps.gate.outputs.gate_result == 'PASS'
        run: echo "Production rollout gate PASSED. ON-flip PR may be merged."
