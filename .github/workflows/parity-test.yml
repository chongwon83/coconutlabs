# Axis 4: Fixture parity test — TS parser output matches Python reference output.
# Runs on every push and PR. Result is consumed by production-rollout-gate.yml
# as a required CI check for the ON-flip PR.

name: parity-test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  parity:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run parity tests (Axis 4)
        run: npm run test:parity
